<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartTask - Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>SmartTask</h1>
    <form id="task-form">
      <input type="text" id="task-input" placeholder="Enter new task" required />
      <select id="priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <input type="date" id="due-date" />
      <button type="submit">Add Task</button>
    </form>

    <div class="filters">
      <button data-filter="all">All</button>
      <button data-filter="low">Low</button>
      <button data-filter="medium">Medium</button>
      <button data-filter="high">High</button>
    </div>

    <ul id="task-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
